services:
  payment-partner-demo:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - demo-data:/app/data
      - demo-reports:/app/reports
    security_opt:
      - no-new-privileges:true

volumes:
  demo-data:
  demo-reports:
